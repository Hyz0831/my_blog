version: '3.8'

services:
  backend:  # ⚠️ 服务名必须是 backend，与 nginx 配置中的 proxy_pass 对应
    build: ./backend
    container_name: blog_backend
    restart: always
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/My_blog_texts.sqlite
    networks:
      - blog_net
    expose:
      - "8000"  # 只暴露给内部网络，不映射到宿主机

  frontend:
    image: nginx:alpine
    container_name: blog_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/nginx/ssl:/etc/nginx/ssl:ro  # 挂载 SSL 证书目录
    depends_on:
      - backend
    networks:
      - blog_net

networks:
  blog_net:
    driver: bridge