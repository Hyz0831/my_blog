version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blog_backend
    restart: always
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/My_blog_texts.sqlite
    networks:
      - blog_net
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"  # ⚠️ 必须添加：让宿主机 Nginx 能访问后端

  frontend:
    image: nginx:alpine
    container_name: blog_frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"    # ⚠️ 必须修改：释放 80/443 给宿主机 Nginx
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - blog_net

networks:
  blog_net:
    driver: bridge