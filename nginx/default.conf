# === HTTP → HTTPS 强制重定向 ===
server {
    listen 80;
    server_name mgj-hyz.icu www.mgj-hyz.icu;
    return 301 https://$host$request_uri;
}

# === HTTPS 主配置 ===
server {
    listen 443 ssl http2;
    # listen [::]:443 ssl http2; # 如果服务器 IPv6 有问题，建议先注释掉这一行
    
    server_name mgj-hyz.icu www.mgj-hyz.icu;

    # 📁 SSL 证书路径 (使用我们之前生成的 Cloudflare Origin Cert)
    ssl_certificate /etc/ssl/cloudflare/mgj-hyz.icu.pem;       
    ssl_certificate_key /etc/ssl/cloudflare/mgj-hyz.icu.key;

    # 🔒 SSL 安全优化配置
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ✅ 前端静态资源 (代理到 Docker 前端容器)
    location / {
        proxy_pass http://127.0.0.1:8080;
        
        # 启用 HTTP/1.1 和 Keep-Alive，提升性能
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ✅ 后端 API 代理 (代理到 Docker 后端容器)
    location /api/ {
        # ⚠️ 关键修改：使用 127.0.0.1 而不是 backend
        proxy_pass http://127.0.0.1:8000;
        
        # 启用 HTTP/1.1 和 Keep-Alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}